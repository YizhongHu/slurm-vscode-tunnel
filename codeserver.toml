root_dir = "~/Apps/slurm-vscode-tunnel/runs"
default_profile = "cpu"
code_bin = "code"
code_tunnel_args = ["tunnel"]

[env]
VSCODE_CLI_USE_FILE_KEYCHAIN = "1"
VSCODE_CLI_DISABLE_KEYCHAIN_ENCRYPT = "1"

[profiles.cpu]
enabled = true
sbatch_args = [
  "--nodes=1",
  "--cpus-per-task=4",
  "--mem=32G",
  "--time=24:00:00",
  "--partition=day",
  "--job-name=codeserver-cpu",
]
pre_commands = [
  "source /etc/profile.d/modules.sh",
  "module load VSCode/1.102.3",
]

[profiles.gpu]
enabled = true
sbatch_args = [
  "--nodes=1",
  "--cpus-per-task=4",
  "--mem=32G",
  "--time=6:00:00",
  "--partition=gpu_devel",
  "--gpus=1",
  "--job-name=codeserver-gpu",
]
pre_commands = [
  "source /etc/profile.d/modules.sh",
  "module load VSCode/1.102.3",
]

[profiles.cpu.env]
# EXAMPLE_VAR = "value"

[profiles.gpu.env]
# EXAMPLE_VAR = "value"
