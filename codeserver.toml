root_dir = "~/Apps/slurm-vscode-tunnel/runs"
default_profile = "cpu"
code_bin = "code"
code_tunnel_args = ["tunnel"]

[env]
VSCODE_CLI_USE_FILE_KEYCHAIN = "1"
VSCODE_CLI_DISABLE_KEYCHAIN_ENCRYPT = "1"

[profiles.cpu]
enabled = true
max_time = "08:00:00"
default_time = "08:00:00"
relay_overlap = "00:15:00"
relay_ready_timeout = "00:05:00"
relay_enabled = true
sbatch_args = [
  "--nodes=1",
  "--cpus-per-task=16",
  "--mem-per-cpu=8G",
  "--job-name=codeserver-cpu",
]
pre_commands = []

[profiles.gpu]
enabled = true
max_time = "06:00:00"
default_time = "06:00:00"
relay_overlap = "00:10:00"
relay_ready_timeout = "00:05:00"
relay_enabled = true
sbatch_args = [
  "--nodes=1",
  "--cpus-per-task=16",
  "--mem-per-cpu=8G",
  "--gpus=1",
  "--job-name=codeserver-gpu",
]
pre_commands = []

[profiles.relay_test]
enabled = true
max_time = "00:10:00"
default_time = "00:10:00"
relay_overlap = "00:02:00"
relay_ready_timeout = "00:02:00"
relay_enabled = true
sbatch_args = [
  "--nodes=1",
  "--cpus-per-task=1",
  "--mem=1G",
  "--job-name=codeserver-relay-test",
]
pre_commands = []

[profiles.cpu.env]
# EXAMPLE_VAR = "value"

[profiles.gpu.env]
# EXAMPLE_VAR = "value"

[profiles.relay_test.env]
# EXAMPLE_VAR = "value"
